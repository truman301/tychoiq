# Render.com blueprint for TychoIQ (alternative to Railway).
# Creates a web service (Docker) + a managed Postgres database.

services:
  - type: web
    name: tychoiq
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tychoiq-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false # set to https://tychoiq.com after the domain is attached
      - key: MOCK_MODE
        value: "true"
      - key: NODE_ENV
        value: production

databases:
  - name: tychoiq-db
    plan: starter
    databaseName: tychoiq
    user: tychoiq
