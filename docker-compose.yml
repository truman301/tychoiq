# Local development / prod-parity services for TychoIQ.
# Postgres is required; Redis is for the future BullMQ scan worker.
#
#   docker compose up -d
#   # then in .env: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/tychoiq?schema=public"
#   npm run db:push && npm run db:seed && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: tychoiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tychoiq
    ports:
      - "5432:5432"
    volumes:
      - tychoiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tychoiq_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tychoiq_redisdata:/data

volumes:
  tychoiq_pgdata:
  tychoiq_redisdata:
